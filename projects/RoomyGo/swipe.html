<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swipe - RoomyGo</title>

    <style>
        :root {
            --pink: #F7D6E0;
            --navy: #1F3A5F;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--pink), var(--white));
            text-align: center;
        }

        /* NAVBAR */
        .navbar {
            background: var(--navy);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .btn {
            background: var(--pink);
            padding: 5px 10px;
            border-radius: 10px;
            color: var(--navy);
        }

        /* SWIPE AREA */
        .swipe-page {
            padding: 30px;
        }

        .card-container {
            position: relative;
            width: 300px;
            height: 380px;
            margin: 40px auto;
        }

        .swipe-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .swipe-card:nth-child(1) { z-index: 3; }
        .swipe-card:nth-child(2) { z-index: 2; transform: scale(0.95); top: 10px; }
        .swipe-card:nth-child(3) { z-index: 1; transform: scale(0.9); top: 20px; }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .buttons button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .no {
            background: #ff4d4d;
            color: white;
        }

        .yes {
            background: #2ecc71;
            color: white;
        }
    </style>
</head>

<header class="top-bar">
  <button onclick="history.back()">← Go Back</button>
  <a href="../../index.html" class="home-link">Home</a>
</header>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>RoomyGo</div>
    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="favourites.html">Favourites</a>
        <a href="messages.html">Messages</a>
        <a href="index.html" class="btn">Logout</a>
    </div>
</div>

<!-- SWIPE -->
<div class="swipe-page">

    <h2>Find Your Match</h2>
    <p>Swipe right to save, left to skip</p>

    <div class="card-container" id="cardContainer">

        <div class="swipe-card">
            <h3>Emily, 23</h3>
            <p>Student | Halifax</p>
            <p>$800/month</p>
            <p>Quiet</p>
        </div>

        <div class="swipe-card">
            <h3>John, 26</h3>
            <p>Engineer | Halifax</p>
            <p>$950/month</p>
            <p>Social</p>
        </div>

        <div class="swipe-card">
            <h3>Sophia, 24</h3>
            <p>Designer | Halifax</p>
            <p>$900/month</p>
            <p>Pet Friendly</p>
        </div>

    </div>

    <div class="buttons">
        <button class="no" onclick="swipeLeft()">❌ Pass</button>
        <button class="yes" onclick="swipeRight()">❤️ Like</button>
    </div>

</div>

<!-- JAVASCRIPT INSIDE HTML -->
<script>
let currentIndex = 0;

// LOAD DATA
function loadAds() {

    let ads = JSON.parse(localStorage.getItem("roomygo_ads")) || [];

    let container = document.getElementById("cardContainer");
    container.innerHTML = "";

    if (ads.length === 0) {
        container.innerHTML = "<h3>No Ads Found</h3>";
        return;
    }

    ads.forEach(ad => {

        let card = document.createElement("div");
        card.className = "swipe-card";

        card.innerHTML = `
            <h3>${ad.name}</h3>
            <p>Type: ${ad.type}</p>
            <p>Location: ${ad.location}</p>
            <p>Budget: $${ad.budget}</p>
            <p>Lifestyle: ${ad.lifestyle}</p>
        `;

        container.appendChild(card);
    });
}

loadAds();

const filters = JSON.parse(localStorage.getItem("roomygo_filters")) || {};
let ads = JSON.parse(localStorage.getItem("roomygo_ads")) || [];
// IMPORTANT: FILTER ADS ONLY
function getFilteredAds() {

    return ads.filter(item => {

        // match type (room / roommate / ad-room etc)
        if (filters.type) {
            if (filters.type === "room" && item.type !== "room") return false;
            if (filters.type === "roommate" && item.type !== "roommate") return false;
        }

        // location match
        if (filters.location && item.location !== filters.location) return false;

        // budget match
        if (filters.budget) {
            if (item.budget > parseInt(filters.budget)) return false;
        }

        return true;
    });
}

// RENDER CARDS
function renderCards() {
    let container = document.getElementById("cardContainer");
    container.innerHTML = "";

    let data = getFilteredAds();

    if (data.length === 0) {
        container.innerHTML = "<h3>No matches found</h3>";
        return;
    }

    data.forEach(item => {
        let card = document.createElement("div");
        card.className = "swipe-card";

        card.innerHTML = `
            <h3>${item.name}</h3>
            <p>Type: ${item.type}</p>
            <p>${item.location}</p>
            <p>Budget: $${item.budget}</p>
            <p>${item.lifestyle}</p>
        `;

        container.appendChild(card);
    });
}

// SWIPE RIGHT
function swipeRight() {
    let cards = document.querySelectorAll(".swipe-card");
    if (currentIndex >= cards.length) return;

    let card = cards[currentIndex];

    card.style.transform = "translateX(400px)";
    card.style.opacity = "0";

    setTimeout(() => {
        saveToFav(card);
        card.remove();
        currentIndex++;
    }, 300);
}

// SWIPE LEFT
function swipeLeft() {
    let cards = document.querySelectorAll(".swipe-card");
    if (currentIndex >= cards.length) return;

    let card = cards[currentIndex];

    card.style.transform = "translateX(-400px)";
    card.style.opacity = "0";

    setTimeout(() => {
        card.remove();
        currentIndex++;
    }, 300);
}

// SAVE TO FAVOURITES
function saveToFav(card) {
    let favs = JSON.parse(localStorage.getItem("favs")) || [];

    favs.push({
        name: card.querySelector("h3").innerText,
        details: card.innerText
    });

    localStorage.setItem("favs", JSON.stringify(favs));
}

// INIT
renderCards();
</script>

<script src="script.js"></script>

</body>
</html>
